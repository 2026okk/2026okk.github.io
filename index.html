<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>摄影作品集 | Personal Photography</title>
     <style>
         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
         }
         body {
             background-color: #0c0c0c;
             color: #eee;
             font-family: "Microsoft Yahei", sans-serif;
             line-height: 1.6;
         }
         /* 顶部封面 */
         .hero {
             height: 100vh;
             background: url('cover.jpg') center/cover no-repeat;
             display: flex;
             align-items: center;
             justify-content: center;
             position: relative;
             background-attachment: fixed;
         }
         .hero::after {
             content: "";
             position: absolute;
             inset: 0;
             background: rgba(0,0,0,0.65);
         }
         .hero-text {
             text-align: center;
             z-index: 2;
         }
         .hero-text h1 {
             font-size: 52px;
             letter-spacing: 8px;
             margin-bottom: 16px;
         }
         .hero-text p {
             font-size: 20px;
             opacity: 0.8;
             letter-spacing: 2px;
         }
         /* 导航栏 */
         .nav-tab {
             text-align: center;
             padding: 50px 20px;
         }
         .nav-tab button {
             background: transparent;
             border: 1px solid #666;
             color: #ccc;
             padding: 10px 24px;
             margin: 0 8px;
             border-radius: 30px;
             cursor: pointer;
             transition: all 0.3s;
         }
         .nav-tab button.active {
             background: #fff;
             color: #000;
             border-color: #fff;
         }
         .nav-tab button:hover {
             border-color: #fff;
             color: #fff;
         }
         /* 作品展示区 */
         .gallery {
             display: grid;
             grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
             gap: 15px;
             padding: 20px;
             max-width: 1200px;
             margin: 0 auto;
         }
         .gallery-item img {
             width: 100%;
             height: 250px;
             object-fit: cover;
             border-radius: 8px;
             transition: transform 0.3s;
         }
         .gallery-item img:hover {
             transform: scale(1.03);
         }
         /* 页脚 */
         footer {
             text-align: center;
             padding: 30px;
             opacity: 0.5;
             font-size: 14px;
         }
     </style>
 </head>
 <body>
     <!-- 首页封面 -->
     <section class="hero">
         <div class="hero-text">
             <h1>okk摄影集</h1>
             <p>投影 · 定晶</p>
         </div>
     </section>
     <!-- 分类导航 -->
     <div class="nav-tab">
         <button class="active" data-tab="all">全部作品</button>
         <button data-tab="portrait">人像摄影</button>
         <button data-tab="view">风光风景</button>
         <button data-tab="life">日常随拍</button>
     </div>
     <!-- 作品展示区 -->
     <div class="gallery">
         <!-- 人像摄影示例（7881） -->
         <div class="gallery-item all portrait">
             <img src="人像1.jpg" alt="人像作品">
         </div>
         <div class="gallery-item all portrait">
             <img src="人像2.jpg" alt="人像作品">
         </div>
         <!-- 风光风景示例 -->
         <div class="gallery-item all view">
             <img src="风光1.jpg" alt="风光作品">
         </div>
         <div class="gallery-item all view">
             <img src="风光2.jpg" alt="风光作品">
         </div>
         <!-- 日常随拍示例 -->
         <div class="gallery-item all life">
             <img src="日常1.jpg" alt="日常作品">
         </div>
         <div class="gallery-item all life">
             <img src="日常2.jpg" alt="日常作品">
         </div>
     </div>
     <footer>
         © 2026 okk 摄影作品集 | All Rights Reserved
     </footer>
     <!-- 分类筛选JS -->
     <script>
         const buttons = document.querySelectorAll('.nav-tab button');
         const items = document.querySelectorAll('.gallery-item');
         buttons.forEach(button => {
             button.addEventListener('click', () => {
                 buttons.forEach(btn => btn.classList.remove('active'));
                 button.classList.add('active');
                 const tab = button.getAttribute('data-tab');
                 items.forEach(item => {
                     if (tab === 'all' || item.classList.contains(tab)) {
                         item.style.display = 'block';
                     } else {
                         item.style.display = 'none';
                     }
                 });
             });
         });
     </script>
 </body>
 </html>
